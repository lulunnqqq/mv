name: Extract Key V1.3

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Step 1 - Run webview (download & deobfuscate → obfuscated.js)
        env:
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: node webview.js

      - name: Step 2 - Run extract (extract result → abc.txt)
        run: node extract.js

      - name: Show result
        run: cat abc.txt

      - name: Commit and push abc.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add abc.txt
          git commit -m "Update abc.txt with latest VRF key"
          git push --force

  manual-rerun:
    name: Re-run workflow
    permissions:
      actions: write
    needs: extract
    if: success() || failure()
    runs-on: ubuntu-latest
    steps:
      - name: Sleep for 30 minutes
        run: sleep 1800

      - name: Re-trigger workflow
        run: gh workflow run pipeline.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}