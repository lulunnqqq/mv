name: Extract VRF Key

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' 

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Step 1 - Run webcrack-puppeteer (download & deobfuscate → obfuscated.js)
        env:
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_USER: ${{ secrets.PROXY_USER }}
          PROXY_PASS: ${{ secrets.PROXY_PASS }}
        run: node webcrack-puppeteer.js

      - name: Step 2 - Run extract-vrf-key (extract result → abc.txt)
        run: node extract-vrf-key.js

      - name: Show result
        run: cat abc.txt

      - name: Commit and push abc.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add abc.txt
          git diff --cached --quiet || git commit -m "Update abc.txt with latest VRF key"
          git push
