name: Solve Cap CAPTCHA

on:
  workflow_dispatch:

jobs:
  solve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run cap_decode (solve challenge → def.txt)
        run: node cap_decode.js

      - name: Show result
        run: cat def.txt

      - name: Commit and push def.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add def.txt
          git diff --cached --quiet || git commit -m "Update def.txt with latest cap token"
          git push

  # Workaround for CI schedule event delays - self re-trigger every 5 minutes
  manual-rerun:
    name: Re-run workflow
    permissions:
      actions: write
    needs: solve
    if: success() || failure()
    runs-on: ubuntu-latest
    steps:
      - name: Sleep for 20 minutes
        run: sleep 1200

      - name: Re-trigger workflow
        run: gh workflow run cap_pipeline.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
